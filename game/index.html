<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>DINO RUSH EXTREME – Jurassic Survivor</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Fredoka+One&family=Heebo:wght@400;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <!-- Core Engine Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
  
  <!-- Post Processing -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
</head>
<body>
  <div id="game-wrapper">
    <!-- Cinematic Overlays -->
    <div id="vignette"></div>
    <div id="damage-flash"></div>
    <div id="loading-screen" class="screen active">
       <h1 class="jurassic-title pulse">LOADING...</h1>
       <div class="loader-bar"><div id="loader-progress"></div></div>
    </div>

    <!-- MAIN MENU & LOBBY -->
    <div id="menu-screen" class="screen">
      <div class="menu-content fade-in">
        <h1 class="jurassic-title mega-title">DINO RUSH 3D EXTREME</h1>
        <p class="subtitle">האם תצליחו לשרוד את התפרצות הלבה?</p>
        
        <div class="player-selection-row">
          <div id="card-shaun" class="pcard-v2" onclick="joinAs('shaun')">
            <img src="static/shaun_3d.png" class="pcard-img">
            <h3 class="pcard-label">אני שון</h3>
            <div id="ready-status-shaun" class="ready-badge">ממתין...</div>
          </div>
          <div id="card-dean" class="pcard-v2" onclick="joinAs('dean')">
            <img src="static/dean_3d.png" class="pcard-img">
            <h3 class="pcard-label">אני דין</h3>
            <div id="ready-status-dean" class="ready-badge">ממתין...</div>
          </div>
        </div>

        <div id="lobby-actions" class="hidden">
           <button id="ready-btn" class="jurassic-btn-v2 pulse" onclick="toggleReady()">אני מוכן!</button>
        </div>
      </div>
    </div>

    <!-- IN-GAME HUD -->
    <div id="game-hud" class="hud-container hidden">
      <div class="hud-top">
         <div class="hud-player p1-hud">
            <span class="hud-role">שון</span>
            <div id="p1-lives" class="hearts-row">🥩🥩🥩</div>
         </div>
         <div class="hud-center">
            <div id="countdown-text" class="countdown hidden">3</div>
            <div class="score-box">
               <div id="hud-score">0</div>
               <div id="hud-multiplier" class="mult hidden">x2</div>
            </div>
         </div>
         <div class="hud-player p2-hud">
            <span class="hud-role">דין</span>
            <div id="p2-lives" class="hearts-row">🥩🥩🥩</div>
         </div>
      </div>
      <div class="combo-tracker" id="combo-alert"></div>
    </div>

    <!-- GAME OVER -->
    <div id="gameover-screen" class="screen">
      <div class="go-content scale-in">
        <h2 class="jurassic-title mega-title color-blood">המשחק נגמר!</h2>
        <div class="final-stats">
           <p>ניקוד סופי: <span id="final-score" class="big-score">0</span></p>
           <p>שיא אישי: <span id="best-score" class="best-score">0</span></p>
        </div>
        <div class="go-actions">
           <button class="jurassic-btn-v2" onclick="window.location.reload()">ציד חדש</button>
        </div>
      </div>
    </div>

    <!-- WebGL Rendering Container -->
    <div id="three-container"></div>
  </div>

  <script src="game.js"></script>
</body>
</html>
